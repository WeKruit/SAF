$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:prediction-market:id-registry:native-assertion:v0
title: Native-to-Canonical ID Assertion v0
contract_version: v0
catalog_ids_are_domain_ids: false
catalog_id_namespaces: [R, I, O]
domain_id_namespaces:
  - competition
  - game
  - participant
  - venue_event
  - market
  - outcome
  - condition
description: Binds one source-native identifier to one canonical domain identifier with an observed validity interval.
type: object
additionalProperties: false
required:
  - assertion_version
  - canonical_id
  - entity_type
  - native_namespace
  - native_id
  - valid_from
  - asserted_at
  - evidence_refs
properties:
  assertion_version:
    const: v0
  canonical_id:
    type: string
    pattern: ^(?:competition|game|participant|venue_event|market|outcome|condition)_[A-Za-z0-9][A-Za-z0-9._:-]*$
    not:
      pattern: ^(?:R|I|O)-[0-9]{3}$
  entity_type:
    enum: [competition, game, participant, venue_event, market, outcome, condition]
  native_namespace:
    type: string
    minLength: 1
  native_id:
    type: string
    minLength: 1
  valid_from:
    $ref: '#/$defs/utc_timestamp'
  valid_to:
    oneOf:
      - $ref: '#/$defs/utc_timestamp'
      - type: 'null'
  asserted_at:
    $ref: '#/$defs/utc_timestamp'
  evidence_refs:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
$defs:
  utc_timestamp:
    type: string
    format: date-time
    pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]+)?Z$
