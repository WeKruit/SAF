$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:prediction-market:model-output:v1
title: State Transition Model Output v1
contract_version: v1
x-normative-semantic-validator:
  callable: prediction_market.contracts.validate_contract_v1
  schema_name: model-output/v1.schema.yaml
  required: true
  requires_program_root: true
  fail_closed_without_runtime: true
description: Registry-backed point-in-time state-transition distribution; final-win-only output is forbidden.
type: object
additionalProperties: false
required:
  - contract_version
  - model_id
  - model_version
  - experiment_id
  - run_id
  - game_id
  - state_event_id
  - pit_cutoff_at
  - output_kind
  - transition_unit
  - state_space
  - horizon
  - probabilities
  - feature_sha256
  - data_sha256
  - config_sha256
  - quality_flags
properties:
  contract_version:
    const: v1
  model_id: {type: string, minLength: 1}
  model_version: {type: string, minLength: 1}
  experiment_id:
    type: string
    pattern: ^X-[0-9]{2,}$
    x-foreign-key: registries/experiment_registry.csv#experiment_id
  run_id: {type: string, minLength: 1}
  game_id:
    type: string
    pattern: ^game_[A-Za-z0-9][A-Za-z0-9._:-]*$
  state_event_id:
    type: string
    pattern: ^evt_[0-9a-f]{64}$
  pit_cutoff_at:
    $ref: '#/$defs/utc_timestamp'
  output_kind:
    const: state_transition
  transition_unit:
    enum: [possession, drive, five_minute_interval]
  state_space:
    type: array
    minItems: 1
    uniqueItems: true
    items: {type: string, minLength: 1}
  horizon:
    const: next_state_transition
  probabilities:
    type: object
    minProperties: 1
    additionalProperties:
      $ref: '#/$defs/probability_fixed_point'
    description: Runtime validation requires keys equal state_space and exact Decimal sum 1.
  feature_sha256: {$ref: '#/$defs/sha256'}
  data_sha256: {$ref: '#/$defs/sha256'}
  config_sha256: {$ref: '#/$defs/sha256'}
  quality_flags:
    type: array
    uniqueItems: true
    items: {$ref: '#/$defs/quality_flag'}
$defs:
  fixed_point:
    type: object
    additionalProperties: false
    required: [atoms, scale]
    properties:
      atoms:
        type: string
        pattern: ^(?:0|-?[1-9][0-9]*)$
      scale:
        type: integer
        minimum: 0
        maximum: 18
  probability_fixed_point:
    allOf:
      - $ref: '#/$defs/fixed_point'
      - properties:
          atoms:
            type: string
            pattern: ^(?:0|[1-9][0-9]*)$
  sha256:
    type: string
    pattern: ^sha256:[0-9a-f]{64}$
  utc_timestamp:
    type: string
    format: date-time
    pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]+)?Z$
  quality_flag:
    enum:
      - clock_jump
      - crossed_book
      - duplicate_event
      - gap_detected
      - missing_initial_snapshot
      - missing_side
      - negative_time_delta
      - non_positive_size
      - out_of_order
      - pause_observed
      - preliminary_rules
      - reconstruction_divergence
      - source_clock_unverified
      - stale_as_of_join
      - tick_size_change
