$schema: https://json-schema.org/draft/2020-12/schema
$id: urn:prediction-market:model-output:v0
title: State Transition Model Output v0
contract_version: v0
description: Point-in-time state-transition distribution; a final win-probability-only output is not this contract.
type: object
additionalProperties: false
required:
  - contract_version
  - model_id
  - model_version
  - experiment_id
  - run_id
  - game_id
  - state_event_id
  - pit_cutoff_at
  - state_space
  - horizon
  - probabilities
  - feature_sha256
  - data_sha256
  - config_sha256
  - quality_flags
properties:
  contract_version:
    const: v0
  model_id:
    type: string
    minLength: 1
  model_version:
    type: string
    minLength: 1
  experiment_id:
    enum: [X-01, X-02, X-03, X-04, X-05, X-06, X-07, X-08, X-09, X-10]
  run_id:
    type: string
    minLength: 1
  game_id:
    type: string
    pattern: ^game_[A-Za-z0-9][A-Za-z0-9._:-]*$
  state_event_id:
    type: string
    pattern: ^evt_[0-9a-f]{64}$
  pit_cutoff_at:
    $ref: '#/$defs/utc_timestamp'
  state_space:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
  horizon:
    type: string
    minLength: 1
  probabilities:
    type: object
    minProperties: 1
    additionalProperties:
      $ref: '#/$defs/fixed_point'
    x-invariant: Keys equal state_space; each value is in [0,1]; the exact Decimal sum is 1.
  feature_sha256:
    $ref: '#/$defs/sha256'
  data_sha256:
    $ref: '#/$defs/sha256'
  config_sha256:
    $ref: '#/$defs/sha256'
  quality_flags:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/quality_flag'
$defs:
  fixed_point:
    type: object
    additionalProperties: false
    required: [atoms, scale]
    properties:
      atoms:
        type: string
        pattern: ^(?:0|-?[1-9][0-9]*)$
      scale:
        type: integer
        minimum: 0
        maximum: 18
  sha256:
    type: string
    pattern: ^sha256:[0-9a-f]{64}$
  utc_timestamp:
    type: string
    format: date-time
    pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]+)?Z$
  quality_flag:
    enum:
      - clock_jump
      - crossed_book
      - duplicate_event
      - gap_detected
      - missing_initial_snapshot
      - missing_side
      - negative_time_delta
      - non_positive_size
      - out_of_order
      - pause_observed
      - preliminary_rules
      - reconstruction_divergence
      - source_clock_unverified
      - stale_as_of_join
      - tick_size_change
