experiment_card:
  id: X-07
  name: Taker cost floor
  owner_team: F+E
  status: registered
  hypothesis: Naive taker net EV is no greater than zero after executable ask entry, bid exit, depth VWAP, point-in-time fee, and delay
  data:
    - source: X-04 event sample and X-01 reconstructed depth
      version: unresolved:x07_event_depth_manifest
      pit_basis: local_receive_time
    - source: venue_rule_snapshot as of simulated time
      version: unresolved:venue_rule_snapshot_replay_version
      pit_basis: effective_at_as_of
  method: Build a taker-only simulator using ask entry, bid exit, depth VWAP, venue-rule fee and delay, plus own-delay sensitivities of 0.5, 1, and 3 seconds.
  leakage_checks:
    - Never backfill present-day rules into history; replay, paper, and later live paths consume the same snapshot stream.
    - Do not use midpoint, constant fees, constant delays, future depth, or suspended quotes.
  split: game-grouped + chronological + walk-forward
  metrics: [net markout distribution by delay, break-even required edge, fee sensitivity, post-fill markout]
  pass_criteria: Complete and register the cost floor and required edge regardless of sign; formal conclusions require venue-rule snapshots consumed by replay.
  fail_criteria: If depth is insufficient, report only a labeled top-of-book optimistic bound and no depth-VWAP claim.
