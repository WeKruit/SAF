experiment_card:
  id: X-12
  name: Soccer Dixon-Coles POC and five-minute transition
  owner_team: D3+H+I
  status: registered
  hypothesis: A StatsBomb Premier League 2015/16 expanding-window Dixon-Coles POC can produce calibrated 1X2 estimates and a separate five-minute goal transition without a point-in-time market prior.
  data:
    - source: StatsBomb open data DS-STATSBOMB-OPEN Premier League 2015/16 competition 2 season 27
      version: commit:b0bc9f22dd77c206ddedc1d742893b3bbe64baec;manifest:unresolved
      pit_basis: event order within the frozen static source snapshot
  method: Fit expanding-window Dixon-Coles on StatsBomb Premier League 2015/16 and report 1X2 multiclass calibration plus home_goal away_goal or no_goal five-minute transitions; no point-in-time market prior is available or imputed.
  leakage_checks:
    - Every training match precedes each held-out match in source chronology.
    - No revised final-match field is used before its prediction cutoff.
    - No current market price or future point-in-time market prior is synthesized.
  split: expanding-window chronological match evaluation on Premier League 2015/16
  metrics: [1X2 multiclass Brier score, multiclass log loss, 1X2 calibration, five-minute transition log loss, season-time stability]
  pass_criteria: A fully locked reproducible POC report with multiclass 1X2 calibration and five-minute transition metrics; the result remains POC only.
  fail_criteria: Missing StatsBomb manifest license context PIT feature/config/seed lock or chronological isolation invalidates the POC. Formal promotion remains unauthorized regardless of POC metrics.
  cost_estimate: {compute: unresolved, human_days: unresolved}
  dependencies: []
  registered_at: '2026-07-22'
  result_acceptance_not_before: '2026-07-23T00:00:00Z'
  due_gate: null
  results_ref: []
  promotion_decision: POC_ONLY
  execution_authorized: false
  completion_required_scopes: [poc_result]
  authorization_scopes:
