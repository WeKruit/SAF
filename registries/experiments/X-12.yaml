      authorized: true
      required_result_label: PRELIMINARY
      required_lock_ids: [statsbomb_manifest_and_version, statsbomb_research_license, pit_feature_contract, dixon_coles_config_and_seed, expanding_window_split, transition_definition, h_split_approval]
    formal_promotion:
      authorized: false
      required_result_label: FORMAL
      required_lock_ids: [statsbomb_manifest_and_version, statsbomb_research_license, pit_feature_contract, dixon_coles_config_and_seed, expanding_window_split, transition_definition, h_split_approval]
