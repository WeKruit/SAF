experiment_card:
  id: X-04
  name: NBA reaction event study
  owner_team: E
  status: registered
  hypothesis: Bid adjustment after a score or lead change is incomplete and exhibits minute-scale drift
  data:
    - source: X-01 reconstructed L2
      version: unresolved:x04_l2_manifest
      pit_basis: local_receive_time
    - source: Historical nba_api play-by-play
      version: unresolved:pbp_version_and_interval_method
      pit_basis: event_time_interval
  method: Reproduce the event-reaction direction at plus/minus 1, 2, 5, 10, 30, and 60 seconds, stratified by liquidity and game phase.
  leakage_checks:
    - Treat sports-event time as [t_min,t_max], never as an exact production-known database timestamp.
    - Lock events, estimator, null, confidence interval, tolerance grid, and strata before observing effects; keep games grouped chronologically.
  split: game-grouped + chronological + walk-forward
  metrics: [partial-adjustment coefficient, drift half-life, six alignment-tolerance results, liquidity strata, game-phase strata, spread-coverage decomposition]
  pass_criteria: Report a researchable or not-identifiable conclusion at every tolerance; minute-scale researchable with second-scale indeterminate is an explicitly valid outcome.
  fail_criteria: Failure to align reliably within plus/minus 60 seconds advances the low-latency sports-feed purchase decision.
  cost_estimate: {compute: unresolved, human_days: unresolved}
  dependencies: [X-01, X-02]
  registered_at: '2026-07-22'
  result_acceptance_not_before: '2026-07-23T00:00:00Z'
  due_gate: null
  results_ref: []
  promotion_decision: ''
  execution_authorized: false
