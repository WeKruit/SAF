experiment_card:
  id: X-06
  name: NBA Game State baseline
  owner_team: D1+H
  status: registered
  hypothesis: Prior plus simple logistic and GBDT features is calibrated and no worse than the market prior under game-grouped walk-forward validation
  data:
    - source: NBA play-by-play candidate DS-NBA-CANDIDATE
      version: unresolved:nba_pbp_static_dataset_manifest
      pit_basis: source_event_time with a separately locked availability contract
    - source: Historical pregame odds or X-01 archive pregame market price
      version: unresolved:pregame_prior_manifest
      pit_basis: frozen_before_game_start
  method: Compare the market prior then feed that same point-in-time prior as an input feature to logistic regression and GBDT; evaluate game-grouped chronological walk-forward calibration and emit a next-possession scoring-outcome transition distribution.
  leakage_checks:
    - No game crosses folds; training games precede test games.
    - Features are production-time available and the prior is frozen before game start.
    - The possession transition target is derived only from events after the state event.
  split: game-grouped + chronological + walk-forward
  metrics: [Brier score versus prior, log loss versus prior, calibration slope, calibration intercept, game-cluster bootstrap confidence interval, possession-transition log loss, game-phase stability, season stability]
  pass_criteria: Gate 1 requires slope 0.9-1.1, intercept near zero under a preregistered tolerance, Brier no worse than prior, and bootstrap-CI support. Gate 2 separately requires a positive prior increment under CI comparable to X-07 cost.
  fail_criteria: Gate 1 failure blocks Reaction Model promotion; Gate 2 failure blocks any trading-relevance claim. Gate 1 never implies Gate 2. Any unresolved NBA license or static manifest blocks an empirical formal result.
  cost_estimate: {compute: unresolved, human_days: unresolved}
  dependencies: []
  registered_at: '2026-07-22'
  result_acceptance_not_before: '2026-07-23T00:00:00Z'
  due_gate: null
  results_ref: []
  promotion_decision: ''
  execution_authorized: true
  completion_required_scopes: [formal_result]
  authorization_scopes:
    contract_harness:
      authorized: true
      required_result_label: PRELIMINARY
      required_lock_ids: []
      input_binding:
