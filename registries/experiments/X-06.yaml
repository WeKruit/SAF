        synthetic_data_sha256: sha256:0ebca90ba56b45252c6d310fd176ba2eb1ac615995b3eacf92e2e3f9c962a15f
    formal_result:
      authorized: false
      required_result_label: FORMAL
      required_lock_ids: [nba_pbp_manifest, pregame_prior_manifest, nba_license_clearance, seasons_features_and_models, calibration_and_bootstrap_parameters]
