experiment_card:
  id: X-06
  name: NBA Game State baseline
  owner_team: D1+H
  status: registered
  hypothesis: Prior plus simple logistic and GBDT features is calibrated and no worse than the market prior under game-grouped walk-forward validation
  data:
    - source: Multi-season NBA play-by-play
      version: unresolved:nba_pbp_manifest
      pit_basis: source_event_time
    - source: Historical pregame odds or X-01 archive pregame market price
      version: unresolved:pregame_prior_manifest
      pit_basis: frozen_before_game_start
  method: Compare market prior, logistic regression, and histogram GBDT with game-grouped chronological walk-forward evaluation and game-cluster bootstrap.
  leakage_checks:
    - No game crosses folds; training games precede test games.
    - Features are production-time available and the prior is frozen before game start.
  split: game-grouped + chronological + walk-forward
  metrics: [Brier score versus prior, log loss versus prior, calibration slope, calibration intercept, game-cluster bootstrap confidence interval, game-phase stability, season stability]
  pass_criteria: Gate 1 requires slope 0.9-1.1, intercept near zero under a preregistered tolerance, Brier no worse than prior, and bootstrap-CI support. Gate 2 separately requires a positive prior increment under CI comparable to X-07 cost.
  fail_criteria: Gate 1 failure blocks Reaction Model promotion; Gate 2 failure blocks any trading-relevance claim. Gate 1 never implies Gate 2.
  cost_estimate: {compute: unresolved, human_days: unresolved}
  dependencies: []
  registered_at: '2026-07-22'
  result_acceptance_not_before: '2026-07-23T00:00:00Z'
  due_gate: null
  results_ref: []
  promotion_decision: ''
  execution_authorized: true
  authorization_scopes:
