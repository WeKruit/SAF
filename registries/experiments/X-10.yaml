experiment_card:
  id: X-10
  name: Matched-cluster semantic precision audit
  owner_team: G+A
  status: registered
  hypothesis: Sports matched clusters have precision below 100% and semantic resolution differences make some apparent matches non-arbitrageable
  data:
    - source: Fifty preregistered sports pairs sampled from PMXT Router clusters
      version: unresolved:router_and_taxonomy_available
      pit_basis: router_observed_at
    - source: Manually adjudicated resolution semantics
      version: unresolved:gold_standard_protocol
      pit_basis: rule_snapshot_observed_at
  method: Sample 50 pairs before inspection; classify relation semantics; manually adjudicate correctness; report precision and confidence calibration. Recall is refused without a candidate-universe denominator.
  leakage_checks:
    - Lock candidate universe, sample selection and seed, Router query/version, taxonomy, adjudication, and confidence bins before correctness review.
    - Precision success cannot authorize live multi-venue arbitrage.
  split: n.a. manual audit; H approval is locked
  metrics: [precision, semantic-difference categories, confidence calibration, recall only after denominator registration]
  pass_criteria: At least 45 of 50 correct pairs permits G1 research to advance; live arbitrage remains NO-GO.
  fail_criteria: Fewer than 45 of 50 requires full manual review of every cluster; unavailable clusters use recorded heuristic matching plus manual review.
  cost_estimate: {compute: unresolved, human_days: unresolved}
