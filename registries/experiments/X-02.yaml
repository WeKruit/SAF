experiment_card:
  id: X-02
  name: Timestamp semantics and clock anomalies
  owner_team: C+H
  status: registered
  hypothesis: timestamp minus timestamp_received has a stable enough distribution to serve as pseudo-latency
  data:
    - source: X-01 game-day events plus three preregistered random days
      version: unresolved:timestamp_input_manifest
      pit_basis: timestamp_received
  method: Measure signed timestamp differences, quantiles, negative values, drift, and receive-time disorder without selecting days from observed quality.
  leakage_checks:
    - Lock the sampling universe, day-selection procedure, seed, units, sign convention, stability definition, and disorder definition before inspection.
    - Do not replace source or receive timestamps with corrected future values.
  split: n.a. for a measurement audit; H approval is locked
  metrics: [difference quantiles, negative difference rate, clock drift, out-of-order rate]
  pass_criteria: Complete and register the measurement; document timestamp semantics and quality-flag rules. Directional stability is not required for validity.
  fail_criteria: Unstable or materially negative distributions downgrade millisecond work to seconds; negative rate at least 0.1% or P99 absolute difference above 5s explicitly triggers that decision.
  cost_estimate: {compute: unresolved, human_days: unresolved}
  dependencies: [X-01]
